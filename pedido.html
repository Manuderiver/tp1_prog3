<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Agus y Manu | Pedido de Servicio</title>

  <link rel="stylesheet"
        href="./css/styles.css" />

</head>

<body>

  <a class="skip-link"
    href="#contenido">

    Saltar al contenido

  </a>

  <header class="site-header">

    <div class="container header-inner">

      <a class="brand"
        href="./index.html"
        aria-label="Ir al inicio">

        <span class="brand-badge"
              aria-hidden="true"></span>

        <span>Agus y Manu</span>

      </a>

      <nav class="site-nav"
          aria-label="Navegación principal">

        <ul>

          <li><a href="./index.html">Home</a></li>

          <li><a href="./servicios.html">Servicios</a></li>

          <li><a href="./equipo.html">Equipo</a></li>

          <li><a href="./pedido.html"
                aria-current="page">

                Pedido

          </a></li>

          <li><a href="./contacto.html">Contacto</a></li>

          <li><a href="./faq.html">FAQ</a></li>

          <li><a href="./pages/login.html">Login</a></li>

        </ul>

      </nav>

    </div>

  </header>

  <main id="contenido">

    <div class="container">

      <section class="section">

        <h2>Pedido de Servicio</h2>

        <p class="lead">

          Completá el formulario para solicitar
          uno de nuestros servicios.

        </p>

        <form action="#"
              method="post"
              aria-label="Formulario de pedido">

          <div class="form-grid">

            <div class="field">

              <label for="nombre">Nombre</label>

              <input id="nombre"
                    name="nombre"
                    type="text"
                    placeholder="Tu nombre"
                    required />

            </div>

            <div class="field">

              <label for="apellido">Apellido</label>

              <input id="apellido"
                    name="apellido"
                    type="text"
                    placeholder="Tu apellido"
                    required />

            </div>

            <div class="field">

              <label for="telefono">Teléfono</label>

              <input id="telefono"
                    name="telefono"
                    type="tel"
                    placeholder="11-1234-5678"
                    required />

            </div>

            <div class="field">

              <label for="email">Email</label>

              <input id="email"
                    name="email"
                    type="email"
                    placeholder="tu@email.com"
                    required />

            </div>

            <div class="field full">

              <label for="servicio">Servicio</label>

              <select id="servicio"
                      name="servicio"
                      required>

                <option value=""
                        selected
                        disabled>

                        Elegí un servicio

                </option>

                <option value="web">
                  Desarrollo Web
                </option>

                <option value="ui">
                  Diseño UI/UX
                </option>

                <option value="data">
                  Datos y Automatización
                </option>

              </select>

            </div>

            <div class="field">

              <label for="fecha">
                Fecha deseada
              </label>

              <input id="fecha"
                    name="fecha"
                    type="date" />

            </div>

            <div class="field">

              <label for="canal">
                Canal de contacto
              </label>

              <select id="canal"
                      name="canal">

                <option value="email">
                  Email
                </option>

                <option value="telefono">
                  Teléfono
                </option>

                <option value="whatsapp">
                  WhatsApp
                </option>

              </select>

            </div>

            <div class="field full">

              <fieldset>

                <legend>Prioridad</legend>

                <div class="choices">

                  <label class="choice">

                    <input type="radio"
                          name="prioridad"
                          value="normal"
                          checked />

                    <span>
                      Normal
                    </span>

                  </label>

                  <label class="choice">

                    <input type="radio"
                          name="prioridad"
                          value="alta" />

                    <span>
                      Alta
                    </span>

                  </label>

                  <label class="choice">

                    <input type="radio"
                          name="prioridad"
                          value="urgente" />

                    <span>
                      Urgente
                    </span>

                  </label>

                </div>

              </fieldset>

            </div>

            <div class="field full">

              <label for="comentarios">
                Comentarios
              </label>

              <textarea id="comentarios"
                        name="comentarios"
                        placeholder="Contanos qué necesitás...">
              </textarea>

            </div>

          </div>

          <div class="form-actions">

            <button class="btn primary"
                    type="submit">

              Enviar

            </button>

            <button class="btn secondary"
                    type="reset">

              Reset

            </button>

          </div>

        </form>

      </section>

    </div>

  </main>

  <footer class="site-footer">

    <div class="container footer-inner">

      <small>
        © 2026 Agus y Manu — TP3
      </small>

    </div>

  </footer>

  <script src="./js/validaciones.js"></script>

</body>

</html>
