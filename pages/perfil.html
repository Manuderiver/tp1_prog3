<!doctype html>
<html lang="es">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Agus y Manu - Mi perfil</title>

    <meta name="description" content="Perfil de usuario" />

    <link rel="stylesheet" href="../css/styles.css" />

</head>

<body>

    <main id="contenido">

        <div class="container">

            <section class="section">

                <h2>Mi Perfil</h2>

                <!-- INFO USUARIO -->
                <div class="grid">

                    <article class="card">

                        <img
                            class="perfil-foto"
                            src=""
                            alt="Foto perfil"
                            width="120"
                        >

                        <h3 class="perfil-nombre">👤 Usuario</h3>

                        <p class="perfil-email">
                            <strong>Email:</strong>
                        </p>

                        <p class="perfil-registro">
                            <strong>Miembro desde:</strong>
                        </p>

                    </article>

                    <article class="card">

                        <h3>📋 Información personal</h3>

                        <p class="perfil-completo">
                            <strong>Nombre completo:</strong>
                        </p>

                    </article>

                </div>

                <!-- SERVICIOS -->
                <h3 style="margin-top: 24px; margin-bottom: 12px;">
                    Servicios solicitados
                </h3>

                <div class="grid servicios-grid"></div>

                <button id="logout-btn" class="btn">
                    Cerrar Sesión
                </button>

            </section>

        </div>

    </main>

    <script src="../js/perfil.js"></script>

</body>

</html>
