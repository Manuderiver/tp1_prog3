<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agus y Manu - Registro</title>
    <meta name="description" content="Agus y Manu - Registro" />
    <link rel="icon" href="../tp 1 prog III/assets/img/servicio-web.svg" />

    <link rel="stylesheet" href="../tp 1 prog III/css/styles.css" />
  </head>

  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../tp 1 prog III/index.html" aria-label="Ir al inicio">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Agus y Manu</span>
        </a>

        <nav class="site-nav" aria-label="Navegación principal">
          <ul>
            <li><a href="../tp 1 prog III/index.html">Home</a></li>
            <li><a href="../tp 1 prog III/servicios.html">Servicios</a></li>
            <li><a href="../tp 1 prog III/equipo.html">Equipo</a></li>
            <li><a href="../tp 1 prog III/pedido.html">Pedido</a></li>
            <li><a href="../tp 1 prog III/contacto.html">Contacto</a></li>
            <li><a href="../tp 1 prog III/faq.html">FAQ</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="contenido">
      <div class="container">
        <section class="section">
          <div class="login-form">

            <h2>Registro</h2>

            <form id="registro-form">
              <div>
                <label for="nombre">Nombre</label>
                <input id="nombre" type="text" required />
              </div>

              <div>
                <label for="apellido">Apellido</label>
                <input id="apellido" type="text" required />
              </div>

              <div>
                <label for="email">Email</label>
                <input id="email" type="email" required />
              </div>

              <div>
                <label for="password">Contraseña</label>
                <input id="password" type="password" required minlength="6" />
              </div>

              <div>
                <label for="confirm-password">Confirmar contraseña</label>
                <input id="confirm-password" type="password" required minlength="6" />
              </div>

              <button class="btn primary" type="submit">Registrarse</button>

              <p>
                ¿Ya tienes cuenta?
                <a href="./login.html">Inicia sesión</a>
              </p>
            </form>

          </div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <small>© 2026 Agus y Manu — TP1 Prog III</small>
        <small><a href="../tp 1 prog III/contacto.html">Escribinos</a></small>
      </div>
    </footer>

    <script src="../js/login.js"></script>
  </body>
</html>
